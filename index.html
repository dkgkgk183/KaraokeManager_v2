<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뜌땨의 노래방 로그 매니저 v7.0</title>
    <style>
        :root { --primary: #6200ea; --bg: #f3f4f6; --text: #333; --border: #e5e7eb; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 16px; color: #888; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; word-break: break-all; }
        th { background: #f9fafb; font-weight: 600; color: #555; }
        .fav-row { background-color: #fff9c4 !important; }
        
        /* 링크 박스 */
        .link-box { margin-bottom: 10px; display: flex; gap: 15px; font-size: 14px; }
        .link-box a { text-decoration: none; color: var(--primary); font-weight: bold; display: flex; align-items: center; }
        .link-box a:hover { text-decoration: underline; }
        
        /* 입력 폼 스타일 (Add Bar) */
        .input-bar { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #666; }
        .input-group input, .input-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* 버튼 */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-icon { padding: 4px 8px; font-size: 14px; background: #eee; border-radius: 4px; cursor: pointer; border:none; }
        .btn-icon:hover { background: #ddd; }

        /* 체크박스 스타일 */
        .checkbox-wrapper { display: flex; align-items: center; height: 38px; }
        .checkbox-wrapper input { width: 20px; height: 20px; cursor: pointer; }

        /* 별점 스타일 */
        .star-control { display: flex; align-items: center; gap: 10px; margin: 15px 0; padding: 10px; background: #fffbeb; border-radius: 8px; border: 1px solid #fcd34d; }
        .stars { font-size: 24px; color: #ddd; letter-spacing: 2px; }
        .star-filled { color: #f59e0b; } /* 꽉 찬 별 */
        .star-half { 
            background: linear-gradient(to right, #f59e0b 50%, #ddd 50%); 
            -webkit-background-clip: text; 
            color: transparent; 
        } /* 반쪽 별 */

        /* 유틸리티 */
        .hidden { display: none; }
        .control-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .file-box { background: #e0e7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        
        /* 모달 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🎧 뜌땨의 노래방 로그 매니저 v7.0</h2>
    
    <div class="file-box">
        <input type="file" id="csvFileInput" accept=".csv" style="display:none">
        <button class="btn btn-primary" onclick="document.getElementById('csvFileInput').click()">📂 CSV 파일 불러오기</button>
        <button class="btn btn-success" onclick="downloadCSV()">💾 변경사항 저장하기 (CSV)</button>
        <p id="statusMsg" style="margin-top:10px; font-size:14px; color:#666;">파일을 먼저 불러와, 뜌땨.</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('library')">📚 노래 라이브러리</button>
        <button class="tab-btn" onclick="switchTab('sessions')">🎤 세션(기록) 관리</button>
        <button class="tab-btn" onclick="switchTab('singers')">👤 가수(멤버) 관리</button>
    </div>

    <div id="tab-library">
        <div class="link-box">
            <a href="https://www.tjmedia.com/song/accompaniment_search" target="_blank">🔍 TJ 노래방 검색</a>
            <a href="https://kysing.kr/" target="_blank">🔍 금영노래방 검색</a>
        </div>

        <div class="input-bar">
            <div class="input-group" style="flex: 2;">
                <label>제목 *</label>
                <input type="text" id="add_title" placeholder="노래 제목">
            </div>
            <div class="input-group" style="flex: 1.5;">
                <label>가수 *</label>
                <input type="text" id="add_artist" placeholder="가수 이름">
            </div>
            <div class="input-group" style="width: 80px;">
                <label>번호</label>
                <input type="text" id="add_number" placeholder="12345">
            </div>
            <div class="input-group" style="width: 80px;">
                <label>반주기</label>
                <select id="add_brand">
                    <option value="TJ">TJ</option>
                    <option value="KY">KY</option>
                </select>
            </div>
            <div class="input-group" style="width: 130px;">
                <label>최고음 *</label>
                <select id="add_pitch">
                    <option value="~2옥타브 솔#">~2옥타브 솔#</option>
                    <option value="2옥타브 라~시">2옥타브 라~시</option>
                    <option value="3옥타브 도~">3옥타브 도~</option>
                </select>
            </div>
            <div class="input-group">
                <label>★</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="add_fav" title="즐겨찾기">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addNewSong()" style="height: 38px;">추가</button>
        </div>

        <div class="control-panel">
            <div style="font-size: 14px; color: #666;" id="songCount">총 0곡</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="searchInput" placeholder="제목/가수 검색..." onkeyup="renderLibrary()" style="width: 250px;">
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table id="libraryTable">
                <thead>
                    <tr>
                        <th width="25%">제목</th><th width="20%">가수</th><th width="10%">번호</th><th width="10%">기기</th><th width="15%">음역대</th><th width="5%">★</th><th width="15%">관리</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="tab-sessions" class="hidden">
        <div class="control-panel" style="justify-content: start; gap: 10px;">
            <label style="font-weight: bold;">새 세션 날짜:</label>
            <input type="date" id="newSessionDate" style="width: auto;">
            <button class="btn btn-primary" onclick="createNewSession()">+ 날짜로 세션 생성</button>
        </div>
        <div style="display: flex; gap: 20px;">
            <div style="width: 30%;">
                <h4>📅 날짜 목록</h4>
                <ul id="sessionList" style="list-style: none; padding: 0; max-height: 600px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px;"></ul>
            </div>
            <div style="width: 70%;" id="sessionDetailPanel" class="hidden">
                <h4 id="currentSessionTitle">상세 정보</h4>
                
                <div class="star-control">
                    <label style="font-weight:bold; font-size:14px;">세션 평가:</label>
                    <input type="range" id="sessionScoreInput" min="0" max="10" step="1" value="0" style="width:150px;" oninput="updateSessionScore(this.value)">
                    <span id="starDisplay" class="stars">☆☆☆☆☆</span>
                    <span id="scoreText" style="font-weight:bold; color:#666; font-size:14px;">(0점)</span>
                </div>

                <div style="margin-bottom: 10px; display:flex; gap:10px;">
                    <button class="btn btn-primary" onclick="openAddSongToSessionModal()">+ 이 날 부른 노래 추가</button>
                    <button class="btn btn-danger" onclick="deleteCurrentSession()">🗑️ 이 세션 삭제</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th width="60">순서</th><th>노래 제목</th><th>가수</th><th>부른 사람</th><th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="sessionSongsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-singers" class="hidden">
        <div class="control-panel">
            <div style="display:flex; gap:10px;">
                <input type="text" id="newSingerName" placeholder="새 멤버 이름" style="width: 200px;">
                <button class="btn btn-primary" onclick="addSinger()">추가</button>
            </div>
        </div>
        <table id="singerTable">
            <thead><tr><th>이름</th><th>관리</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="editSongModal" class="modal">
    <div class="modal-content">
        <h3>노래 정보 수정</h3>
        <input type="hidden" id="editSongId">
        <div class="input-group" style="margin-bottom:10px"><label>제목</label><input type="text" id="edit_title"></div>
        <div class="input-group" style="margin-bottom:10px"><label>가수</label><input type="text" id="edit_artist"></div>
        <div class="input-group" style="margin-bottom:10px"><label>번호</label><input type="text" id="edit_number"></div>
        <div class="input-group" style="margin-bottom:10px">
            <label>반주기</label>
            <select id="edit_brand"><option value="TJ">TJ</option><option value="KY">KY</option></select>
        </div>
        <div class="input-group" style="margin-bottom:10px">
            <label>최고음</label>
            <select id="edit_pitch">
                <option value="~2옥타브 솔#">~2옥타브 솔#</option>
                <option value="2옥타브 라~시">2옥타브 라~시</option>
                <option value="3옥타브 도~">3옥타브 도~</option>
            </select>
        </div>
        <div class="input-group" style="margin-bottom:10px">
            <label>즐겨찾기</label>
            <select id="edit_fav"><option value="0">일반</option><option value="1">★ 즐겨찾기</option></select>
        </div>
        <div style="text-align:right;">
            <button class="btn btn-secondary" onclick="closeModal('editSongModal')">취소</button>
            <button class="btn btn-primary" onclick="saveEditedSong()">수정 완료</button>
        </div>
    </div>
</div>

<div id="sessionAddModal" class="modal">
    <div class="modal-content">
        <h3>세션에 노래 추가</h3>
        <input type="text" id="sessSearch" placeholder="노래 검색..." onkeyup="renderSessionAddList()" style="margin-bottom:10px; width:100%;">
        <div style="max-height: 300px; overflow-y: auto; border: 1px solid #eee;">
            <table id="sessAddListTable"><tbody></tbody></table>
        </div>
        <div style="text-align:right; margin-top:10px;">
            <button class="btn btn-secondary" onclick="closeModal('sessionAddModal')">닫기</button>
        </div>
    </div>
</div>

<script>
    let songs = [];
    let sessions = [];
    let entries = [];
    let singers = [];
    let headerRow = [];

    function generateID(prefix) { return prefix + '_' + Date.now(); }

    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            songs = []; sessions = []; entries = []; singers = []; headerRow = [];
            parseCSV(text);
            document.getElementById('statusMsg').innerText = `✅ 로드 완료! 노래: ${songs.length}곡, 세션: ${sessions.length}개`;
            renderLibrary(); renderSingers(); renderSessionList();
            document.getElementById('csvFileInput').value = ''; 
        };
        reader.readAsText(file, 'UTF-8');
    });

    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let insideQuote = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i+1];
            if (char === '"') {
                if (insideQuote && nextChar === '"') { currentCell += '"'; i++; }
                else { insideQuote = !insideQuote; }
            } else if (char === ',' && !insideQuote) {
                currentRow.push(currentCell); currentCell = '';
            } else if ((char === '\r' || char === '\n') && !insideQuote) {
                if (char === '\r' && nextChar === '\n') i++;
                currentRow.push(currentCell); rows.push(currentRow);
                currentRow = []; currentCell = '';
            } else { currentCell += char; }
        }
        if (currentCell) currentRow.push(currentCell);
        if (currentRow.length > 0) rows.push(currentRow);

        headerRow = rows[0];
        rows.slice(1).forEach(row => {
            if (row.length < 2) return;
            const obj = {
                id: row[1], type: row[0],
                d1: row[2] || '', d2: row[3] || '', d3: row[4] || '', 
                d4: row[5] || '', d5: row[6] || '', d6: row[7] || ''
            };
            if (obj.type === 'SONG') songs.push(obj);
            else if (obj.type === 'SESS') {
                // SESS d3 = 별점 (없으면 0 처리)
                if(!obj.d3) obj.d3 = '0';
                sessions.push(obj);
            }
            else if (obj.type === 'ENTR') entries.push(obj);
            else if (obj.type === 'PERF') singers.push(obj);
        });
    }

    function generateCSV() {
        if(!headerRow.length) headerRow = ["#TYPE", "ID(수정금지)", "DATA1", "DATA2", "DATA3", "DATA4", "DATA5", "DATA6"];
        let csvContent = headerRow.join(',') + '\r\n';
        
        const formatRow = (type, id, d1, d2, d3, d4, d5, d6) => {
            const cols = [type, id, d1, d2, d3, d4, d5, d6].map(val => {
                const s = String(val ?? '');
                return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
            });
            return cols.join(',');
        };

        entries.sort((a, b) => {
            if (a.d1 !== b.d1) return a.d1.localeCompare(b.d1);
            return (parseInt(a.d4) || 0) - (parseInt(b.d4) || 0);
        });

        songs.forEach(s => csvContent += formatRow('SONG', s.id, s.d1, s.d2, s.d3, s.d4, s.d5, s.d6) + '\r\n');
        sessions.forEach(s => csvContent += formatRow('SESS', s.id, s.d1, s.d2, s.d3, s.d4, s.d5, s.d6) + '\r\n');
        entries.forEach(s => csvContent += formatRow('ENTR', s.id, s.d1, s.d2, s.d3, s.d4, s.d5, s.d6) + '\r\n');
        singers.forEach(s => csvContent += formatRow('PERF', s.id, s.d1, s.d2, s.d3, s.d4, s.d5, s.d6) + '\r\n');

        return csvContent;
    }

    function downloadCSV() {
        if (songs.length === 0 && sessions.length === 0) { alert('데이터가 없어, 뜌땨!'); return; }
        const csvContent = generateCSV();
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        
        // 날짜 기반 파일명 생성
        const now = new Date();
        const yy = String(now.getFullYear()).slice(-2);
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mi = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const filename = `karaoke_backup_com_${yy}${mm}${dd}_${hh}${mi}${ss}.csv`;

        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function switchTab(tabName) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById(`tab-${tabName}`).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        if (tabName === 'sessions') renderSessionList();
        if (tabName === 'singers') renderSingers();
    }

    // --- 색상 및 스타일 헬퍼 ---
    function getColorForPitch(pitch) {
        if (pitch.includes('~2옥타브 솔#')) return '#2e7d32'; // 초록
        if (pitch.includes('2옥타브 라~시')) return '#1565c0'; // 파랑
        if (pitch.includes('3옥타브 도~')) return '#d32f2f'; // 빨강
        return '#333';
    }
    function getColorForBrand(brand) {
        if (brand === 'TJ') return '#6a1b9a'; // 보라
        if (brand === 'KY') return '#ef6c00'; // 주황
        return '#333';
    }

    // --- 노래 라이브러리 ---
    function renderLibrary() {
        const tbody = document.querySelector('#libraryTable tbody');
        tbody.innerHTML = '';
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        let displaySongs = [...songs];
        
        // 정렬: 영문/특수문자 -> 한글 순서 (기본 localeCompare 동작)
        displaySongs.sort((a, b) => a.d1.localeCompare(b.d1));
        
        let count = 0;
        displaySongs.forEach(s => {
            if (s.d1.toLowerCase().includes(keyword) || s.d2.toLowerCase().includes(keyword)) {
                count++;
                const tr = document.createElement('tr');
                if (s.d6 == '1') tr.classList.add('fav-row');
                
                const brandColor = getColorForBrand(s.d4);
                const pitchColor = getColorForPitch(s.d5);

                tr.innerHTML = `
                    <td>${s.d1}</td>
                    <td>${s.d2}</td>
                    <td>${s.d3}</td>
                    <td style="color:${brandColor}; font-weight:bold;">${s.d4}</td>
                    <td style="color:${pitchColor}; font-weight:bold;">${s.d5}</td>
                    <td style="color:${s.d6 == '1' ? '#f59e0b' : '#ddd'}; font-size:1.2em;">${s.d6 == '1' ? '★' : '☆'}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="openEditSongModal('${s.id}')">수정</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteSong('${s.id}')">삭제</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
        document.getElementById('songCount').innerText = `총 ${count}곡`;
    }

    function addNewSong() {
        const title = document.getElementById('add_title').value;
        const artist = document.getElementById('add_artist').value;
        if (!title || !artist) { alert('제목과 가수는 필수야, 뜌땨!'); return; }
        
        const newSong = {
            id: generateID('ID'), type: 'SONG',
            d1: title, d2: artist,
            d3: document.getElementById('add_number').value,
            d4: document.getElementById('add_brand').value,
            d5: document.getElementById('add_pitch').value,
            d6: document.getElementById('add_fav').checked ? '1' : '0'
        };
        songs.push(newSong);
        document.getElementById('add_title').value = '';
        document.getElementById('add_artist').value = '';
        document.getElementById('add_number').value = '';
        document.getElementById('add_fav').checked = false;
        renderLibrary();
    }

    function openEditSongModal(id) {
        document.getElementById('editSongModal').style.display = 'flex';
        const s = songs.find(x => x.id === id);
        document.getElementById('editSongId').value = s.id;
        document.getElementById('edit_title').value = s.d1;
        document.getElementById('edit_artist').value = s.d2;
        document.getElementById('edit_number').value = s.d3;
        document.getElementById('edit_brand').value = s.d4;
        document.getElementById('edit_pitch').value = s.d5;
        document.getElementById('edit_fav').value = s.d6;
    }

    function saveEditedSong() {
        const id = document.getElementById('editSongId').value;
        const idx = songs.findIndex(x => x.id === id);
        if (idx > -1) {
            songs[idx].d1 = document.getElementById('edit_title').value;
            songs[idx].d2 = document.getElementById('edit_artist').value;
            songs[idx].d3 = document.getElementById('edit_number').value;
            songs[idx].d4 = document.getElementById('edit_brand').value;
            songs[idx].d5 = document.getElementById('edit_pitch').value;
            songs[idx].d6 = document.getElementById('edit_fav').value;
            closeModal('editSongModal');
            renderLibrary();
        }
    }

    function deleteSong(id) {
        if(!confirm('정말 삭제할 거야? 세션 기록에서도 사라질 수 있어.')) return;
        songs = songs.filter(s => s.id !== id);
        renderLibrary();
    }

    // --- 세션 관리 ---
    let currentSessionId = null;

    function renderSessionList() {
        const ul = document.getElementById('sessionList');
        ul.innerHTML = '';
        sessions.sort((a,b) => b.d1.localeCompare(a.d1)).forEach(sess => {
            const li = document.createElement('li');
            li.style.padding = '12px';
            li.style.cursor = 'pointer';
            li.style.borderBottom = '1px solid #eee';
            const dateOnly = sess.d1.split(' ')[0];
            li.innerHTML = `<strong>${dateOnly}</strong>`;
            li.onclick = () => {
                Array.from(ul.children).forEach(c => c.style.background = 'white');
                li.style.background = '#e0e7ff';
                loadSessionDetail(sess.id);
            };
            ul.appendChild(li);
        });
    }

    function createNewSession() {
        const dateInput = document.getElementById('newSessionDate').value;
        if (!dateInput) { alert('날짜를 먼저 선택해!'); return; }
        const timeString = dateInput + ' 00:00';
        const newSess = { id: generateID('ID'), type: 'SESS', d1: timeString, d2:'', d3:'0', d4:'', d5:'', d6:'' };
        sessions.push(newSess);
        renderSessionList();
        loadSessionDetail(newSess.id);
        document.getElementById('newSessionDate').value = '';
    }

    function loadSessionDetail(sessId) {
        currentSessionId = sessId;
        document.getElementById('sessionDetailPanel').classList.remove('hidden');
        const sess = sessions.find(s => s.id === sessId);
        document.getElementById('currentSessionTitle').innerText = `📅 ${sess.d1.split(' ')[0]} 세션 상세`;
        
        // 별점 로드 (d3)
        const score = sess.d3 ? parseInt(sess.d3) : 0;
        document.getElementById('sessionScoreInput').value = score;
        updateSessionScore(score); // UI 업데이트

        renderSessionSongs();
    }

    function updateSessionScore(val) {
        // UI 업데이트
        const score = parseInt(val);
        document.getElementById('scoreText').innerText = `(${score}점)`;
        
        // 별 그리기 로직 (1점 = 반개)
        // score 0 ~ 10.
        // ex) score 3 -> 1.5 stars -> Full, Half, Empty, Empty, Empty
        let html = '';
        for(let i=1; i<=5; i++) {
            if (score >= i * 2) {
                html += '<span class="star-filled">★</span>'; // 꽉 찬 별
            } else if (score >= i * 2 - 1) {
                html += '<span class="star-half">★</span>'; // 반쪽 별
            } else {
                html += '☆'; // 빈 별
            }
        }
        document.getElementById('starDisplay').innerHTML = html;

        // 데이터 저장
        const sess = sessions.find(s => s.id === currentSessionId);
        if (sess) sess.d3 = String(score);
    }

    function renderSessionSongs() {
        const tbody = document.getElementById('sessionSongsTable');
        tbody.innerHTML = '';
        let currentEntries = entries.filter(e => e.d1 === currentSessionId);
        currentEntries.sort((a, b) => parseInt(a.d4 || 0) - parseInt(b.d4 || 0));

        let singerOptions = `<option value="">(선택)</option>`;
        singers.forEach(s => singerOptions += `<option value="${s.d1}">${s.d1}</option>`);

        currentEntries.forEach((entry, idx) => {
            const song = songs.find(s => s.id === entry.d2) || { d1: '(삭제된 노래)', d2: '-' };
            const currentSinger = entry.d3 || '';
            entry.d4 = idx + 1; 

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <button class="btn-icon" onclick="moveEntry('${entry.id}', -1)">▲</button>
                    <button class="btn-icon" onclick="moveEntry('${entry.id}', 1)">▼</button>
                    <span style="margin-left:5px; font-weight:bold;">${idx + 1}</span>
                </td>
                <td>${song.d1}</td>
                <td>${song.d2}</td>
                <td>
                    <select onchange="updateEntrySinger('${entry.id}', this.value)" style="width:100%">
                        ${singerOptions}
                    </select>
                </td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteEntry('${entry.id}')">X</button></td>
            `;
            tr.querySelector('select').value = currentSinger;
            tbody.appendChild(tr);
        });
    }

    function moveEntry(entryId, direction) {
        let currentEntries = entries.filter(e => e.d1 === currentSessionId);
        currentEntries.sort((a, b) => parseInt(a.d4 || 0) - parseInt(b.d4 || 0));
        const currentIndex = currentEntries.findIndex(e => e.id === entryId);
        if (currentIndex === -1) return;
        const targetIndex = currentIndex + direction;
        if (targetIndex < 0 || targetIndex >= currentEntries.length) return; 

        const tempOrder = currentEntries[currentIndex].d4;
        currentEntries[currentIndex].d4 = currentEntries[targetIndex].d4;
        currentEntries[targetIndex].d4 = tempOrder;
        renderSessionSongs();
    }

    function openAddSongToSessionModal() {
        document.getElementById('sessionAddModal').style.display = 'flex';
        document.getElementById('sessSearch').value = '';
        renderSessionAddList();
    }

    function renderSessionAddList() {
        const tbody = document.querySelector('#sessAddListTable tbody');
        tbody.innerHTML = '';
        const keyword = document.getElementById('sessSearch').value.toLowerCase();
        
        songs.forEach(s => {
            if (s.d1.toLowerCase().includes(keyword) || s.d2.toLowerCase().includes(keyword)) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding:8px;">
                        <div style="font-weight:bold;">${s.d1}</div>
                        <div style="font-size:12px; color:#666;">${s.d2}</div>
                    </td>
                    <td style="text-align:right;">
                        <button class="btn btn-primary btn-sm" onclick="addSongToSession('${s.id}')">추가</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function addSongToSession(songId) {
        const currentEntries = entries.filter(e => e.d1 === currentSessionId);
        const nextOrder = currentEntries.length + 1;
        const newEntry = {
            id: generateID('ID'), type: 'ENTR',
            d1: currentSessionId, d2: songId, d3: '', d4: nextOrder, d5: '', d6: ''
        };
        entries.push(newEntry);
        closeModal('sessionAddModal');
        renderSessionSongs();
    }

    function updateEntrySinger(entryId, name) {
        const ent = entries.find(e => e.id === entryId);
        if (ent) ent.d3 = name;
    }

    function deleteEntry(entryId) {
        entries = entries.filter(e => e.id !== entryId);
        renderSessionSongs();
    }

    function deleteCurrentSession() {
        if (!confirm('세션 삭제하면 복구 못 해!')) return;
        sessions = sessions.filter(s => s.id !== currentSessionId);
        entries = entries.filter(e => e.d1 !== currentSessionId);
        document.getElementById('sessionDetailPanel').classList.add('hidden');
        renderSessionList();
    }

    // --- 가수 관리 ---
    function renderSingers() {
        const tbody = document.querySelector('#singerTable tbody');
        tbody.innerHTML = '';
        singers.sort((a,b) => a.d1.localeCompare(b.d1));
        singers.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${s.d1}</td><td><button class="btn btn-danger btn-sm" onclick="deleteSinger('${s.id}', '${s.d1}')">삭제</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function addSinger() {
        const name = document.getElementById('newSingerName').value;
        if (!name) return;
        singers.push({ id: generateID('ID'), type: 'PERF', d1: name, d2:'', d3:'', d4:'', d5:'', d6:'' });
        document.getElementById('newSingerName').value = '';
        renderSingers();
    }

    function deleteSinger(id, name) {
        if (!confirm(`정말 "${name}" 멤버를 삭제할 거야?\n(주의: 다른 세션 기록에서도 이 사람의 이름이 사라져!)`)) return;
        singers = singers.filter(s => s.id !== id);
        renderSingers();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onclick = function(event) { if (event.target.classList.contains('modal')) event.target.style.display = "none"; }
</script>
</body>
</html>
